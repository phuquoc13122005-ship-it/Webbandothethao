$kind: http-request
url: "{{baseUrl}}/api/auth/forgot-password/request"
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "email": "{{userEmail}}"
    }
scripts:
  - type: afterResponse
    code: |-
      const body = pm.response.json() || {};
      const code = body?.data?.preview?.confirmationCode || '';
      if (code) pm.collectionVariables.set('resetCode', code);
    language: text/javascript
order: 8000
