$kind: http-request
url: "{{baseUrl}}/api/promotions/assignments/{{promotionId}}"
method: GET
scripts:
  - type: afterResponse
    code: >-
      const rows = pm.response.json()?.data || [];

      if (Array.isArray(rows) && rows.length > 0)
      pm.collectionVariables.set('promotionAssignmentId', rows[0].id || '');
    language: text/javascript
order: 3000
