$kind: http-request
url: "{{baseUrl}}/api/db/query"
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "table": "orders",
      "select": "id,status,total,created_at",
      "order": { "column": "created_at", "ascending": false },
      "limit": 10000
    }
scripts:
  - type: afterResponse
    code: |-
      const rows = pm.response.json()?.data || [];
      console.log('Total orders:', Array.isArray(rows) ? rows.length : 0);
    language: text/javascript
order: 2841
