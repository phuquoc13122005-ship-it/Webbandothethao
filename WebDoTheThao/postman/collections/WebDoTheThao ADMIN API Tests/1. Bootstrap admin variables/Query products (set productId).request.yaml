$kind: http-request
url: "{{baseUrl}}/api/db/query"
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "table": "products",
      "select": "*",
      "order": { "column": "created_at", "ascending": false },
      "limit": 10
    }
scripts:
  - type: afterResponse
    code: >-
      const rows = pm.response.json()?.data || [];

      if (Array.isArray(rows) && rows.length > 0)
      pm.collectionVariables.set('productId', rows[0].id || '');
    language: text/javascript
order: 2000
