$kind: http-request
url: "{{baseUrl}}/api/db/query"
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "table": "support_requests",
      "select": "*",
      "order": { "column": "created_at", "ascending": false },
      "limit": 10
    }
order: 4000
